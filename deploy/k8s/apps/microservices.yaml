apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-routes
  namespace: carpool
data:
  gateway.yml: |
    spring:
      cloud:
        gateway:
          server:
            webmvc:
              routes:
                - id: trip-passenger-route
                  uri: lb://trip-service
                  predicates:
                    - Path=/api/passenger/trips,/api/passenger/trips/**
                - id: trip-driver-route
                  uri: lb://trip-service
                  predicates:
                    - Path=/api/driver/trips,/api/driver/trips/**
                - id: map-route
                  uri: lb://trip-service
                  predicates:
                    - Path=/api/map/**
                - id: trip-route
                  uri: lb://trip-service
                  predicates:
                    - Path=/api/trip/**
                - id: passenger-auth-route
                  uri: lb://passenger-service
                  predicates:
                    - Path=/api/passenger/auth/**
                - id: passenger-profile-route
                  uri: lb://passenger-service
                  predicates:
                    - Path=/api/passenger/profile,/api/passenger/profile/**
                - id: driver-auth-route
                  uri: lb://driver-service
                  predicates:
                    - Path=/api/driver/auth/**
                - id: driver-route
                  uri: lb://driver-service
                  predicates:
                    - Path=/api/driver/online,/api/driver/offline,/api/driver/location,/api/driver/documents,/api/driver/documents/**,/api/driver/profile,/api/driver/profile/**
                - id: admin-route
                  uri: lb://admin-service
                  predicates:
                    - Path=/api/admin/**
                - id: ai-assistant-route
                  uri: lb://ai-assistant-service
                  predicates:
                    - Path=/api/assistant,/api/assistant/**
                - id: internal-passenger-route
                  uri: lb://passenger-service
                  predicates:
                    - Path=/api/internal/passenger/**
                - id: internal-driver-route
                  uri: lb://driver-service
                  predicates:
                    - Path=/api/internal/driver/**
                - id: internal-trip-route
                  uri: lb://trip-service
                  predicates:
                    - Path=/api/internal/trip/**
    app:
      jwt:
        secret: ${APP_JWT_SECRET:CHANGE_ME_JWT_SECRET}
        public-paths: /api/passenger/auth/login,/api/passenger/auth/register,/api/driver/auth/login,/api/driver/auth/register,/api/admin/auth/login,/api/map/**,/actuator/**
    management:
      endpoints:
        web:
          exposure:
            include: health,info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: carpool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: carpool/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CLOUD_NACOS_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_CONFIG_IMPORT
              value: "optional:file:/config/gateway.yml"
            - name: SW_AGENT_NAME
              value: gateway
            - name: SW_AGENT_COLLECTOR_BACKEND_SERVICES
              value: skywalking-oap:11800
            - name: SW_AGENT_ENABLED
              value: "true"
          volumeMounts:
            - name: gateway-routes
              mountPath: /config
              readOnly: true
      volumes:
        - name: gateway-routes
          configMap:
            name: gateway-routes
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: carpool
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: passenger-service
  namespace: carpool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passenger-service
  template:
    metadata:
      labels:
        app: passenger-service
    spec:
      containers:
        - name: passenger-service
          image: carpool/passenger-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: nacos:8848
            - name: SEATA_REGISTRY_NACOS_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.mysql.cj.jdbc.Driver
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/carpool_passenger_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: root-password
            - name: SW_AGENT_NAME
              value: passenger-service
            - name: SW_AGENT_COLLECTOR_BACKEND_SERVICES
              value: skywalking-oap:11800
            - name: SW_AGENT_ENABLED
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: passenger-service
  namespace: carpool
spec:
  selector:
    app: passenger-service
  ports:
    - port: 8082
      targetPort: 8082
