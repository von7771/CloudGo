# SkyWalking OAP + UI + BanyanDB（10.2 起必须用 BanyanDB/ES，不能用 H2）
# 部署：kubectl apply -f deploy/k8s/infra/skywalking.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-banyandb
  namespace: carpool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-banyandb
  template:
    metadata:
      labels:
        app: skywalking-banyandb
    spec:
      containers:
        - name: banyandb
          image: apache/skywalking-banyandb:0.8.0
          imagePullPolicy: IfNotPresent
          args: ["standalone"]
          ports:
            - containerPort: 17912
            - containerPort: 17913
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "768Mi"
          readinessProbe:
            tcpSocket:
              port: 17912
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-banyandb
  namespace: carpool
spec:
  selector:
    app: skywalking-banyandb
  ports:
    - name: grpc
      port: 17912
      targetPort: 17912
    - name: http
      port: 17913
      targetPort: 17913
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-oap
  namespace: carpool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-oap
  template:
    metadata:
      labels:
        app: skywalking-oap
    spec:
      containers:
        - name: oap
          image: apache/skywalking-oap-server:10.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11800
            - containerPort: 12800
          env:
            - name: SW_STORAGE
              value: banyandb
            - name: SW_STORAGE_BANYANDB_TARGETS
              value: skywalking-banyandb:17912
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1536m"
          resources:
            requests:
              memory: "768Mi"
            limits:
              memory: "2Gi"
          startupProbe:
            tcpSocket:
              port: 12800
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 12800
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-oap
  namespace: carpool
spec:
  selector:
    app: skywalking-oap
  ports:
    - name: grpc
      port: 11800
      targetPort: 11800
    - name: rest
      port: 12800
      targetPort: 12800
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-ui
  namespace: carpool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-ui
  template:
    metadata:
      labels:
        app: skywalking-ui
    spec:
      containers:
        - name: ui
          image: apache/skywalking-ui:10.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SW_OAP_ADDRESS
              value: http://skywalking-oap:12800
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-ui
  namespace: carpool
spec:
  type: NodePort
  selector:
    app: skywalking-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30088
