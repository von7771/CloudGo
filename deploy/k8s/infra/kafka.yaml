# Kafka 兼容消息队列（Redpanda 单节点，Demo 资源占用小）
# 集群内地址：kafka:9092
# 部署：kubectl apply -f deploy/k8s/infra/kafka.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: carpool
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              rpk redpanda start \
                --kafka-addr internal://0.0.0.0:9092 \
                --advertise-kafka-addr internal://kafka:9092 \
                --mode dev-container \
                --smp 1 \
                --memory 512M \
                --reserve-memory 0M \
                --overprovisioned \
                --default-log-level=warn
          ports:
            - containerPort: 9092
              name: kafka
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: carpool
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
