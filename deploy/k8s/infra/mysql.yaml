apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: carpool
type: Opaque
stringData:
  root-password: CHANGE_ME_MYSQL_ROOT_PASSWORD
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: carpool
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: carpool
data:
  schema.sql: |
    CREATE DATABASE IF NOT EXISTS carpool_passenger_db;
    CREATE DATABASE IF NOT EXISTS carpool_trip_db;
    CREATE DATABASE IF NOT EXISTS carpool_driver_db;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: carpool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: root-password
          ports:
            - containerPort: 3306
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: carpool
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
