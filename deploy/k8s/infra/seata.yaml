apiVersion: v1
kind: ConfigMap
metadata:
  name: seata-server-config
  namespace: carpool
data:
  application.yml: |
    server:
      port: 8091
    spring:
      application:
        name: seata-server
      main:
        web-application-type: none
    logging:
      config: classpath:logback-spring.xml
      file:
        path: ${log.home:${user.home}/logs/seata}
    seata:
      config:
        type: nacos
        nacos:
          server-addr: nacos:8848
          group: SEATA_GROUP
          data-id: seataServer.properties
      registry:
        type: nacos
        nacos:
          application: seata-server
          server-addr: nacos:8848
          group: SEATA_GROUP
          cluster: default
      store:
        mode: file
        file:
          dir: file_store/data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seata-server
  namespace: carpool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seata-server
  template:
    metadata:
      labels:
        app: seata-server
    spec:
      containers:
        - name: seata-server
          image: apache/seata-server:2.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            - name: SEATA_PORT
              value: "8091"
            - name: SEATA_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: seata-config
              mountPath: /seata-server/resources/application.yml
              subPath: application.yml
      volumes:
        - name: seata-config
          configMap:
            name: seata-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: seata-server
  namespace: carpool
spec:
  selector:
    app: seata-server
  ports:
    - name: rpc
      port: 8091
      targetPort: 8091
