<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>司机端 - 收单与位置上报</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    button { background: #52c41a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button.secondary { background: #1677ff; }
    button.danger { background: #ff4d4f; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; font-size: 13px; min-height: 100px; }
    .hint { color: #666; font-size: 13px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status { padding: 8px 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>司机端</h1>
  <p class="hint">登录 → 上线 → 每 <strong>60 秒</strong>自动上报位置（演示模式沿预设路线移动）。同时可收 WebSocket 新单推送。</p>

  <label>Gateway 地址</label>
  <input id="baseUrl" value="http://127.0.0.1:30080" />

  <label>WebSocket 地址（K8s 需 port-forward trip-service 或 NodePort）</label>
  <input id="wsUrl" value="ws://127.0.0.1:30081/ws/driver/trips" />

  <label>用户名</label>
  <input id="username" value="driver1" />
  <label>密码</label>
  <input id="password" type="password" value="123456" />

  <div class="row">
    <button class="secondary" onclick="login()">1. 登录</button>
    <button onclick="goOnline()">2. 上线</button>
  </div>
  <div class="row">
    <button onclick="startLocationLoop()">3. 开始上报位置(60s)</button>
    <button class="danger" onclick="stopAll()">停止上报并下线</button>
  </div>
  <div class="row">
    <button class="secondary" onclick="connectWs()">连接收单 WS</button>
    <button onclick="disconnectWs()">断开 WS</button>
  </div>

  <div class="status" id="status">未登录</div>

  <h3>日志</h3>
  <pre id="log">等待操作...</pre>

  <script>
    let token = '';
    let driverId = '';
    let locationTimer = null;
    let routeIndex = 0;
    let socket = null;

    // 演示路线：广州大学城 → 广州南站方向（每分钟前进一个点）
    const DEMO_ROUTE = [
      [113.384994, 23.059958],
      [113.376200, 23.056100],
      [113.367500, 23.052200],
      [113.358800, 23.048300],
      [113.350100, 23.044400],
      [113.341400, 23.040500],
      [113.332700, 23.036600],
      [113.324000, 23.032700],
      [113.315300, 23.028800],
      [113.306600, 23.024900],
      [113.297900, 23.021000],
      [113.289200, 23.017100],
      [113.280500, 23.013200],
      [113.271800, 23.009300],
      [113.263100, 23.005400]
    ];

    function log(msg) {
      const el = document.getElementById('log');
      const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.textContent = (el.textContent === '等待操作...' ? '' : el.textContent + '\n') + line;
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function base() {
      return document.getElementById('baseUrl').value.replace(/\/$/, '');
    }

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch(`${base()}/api/driver/auth/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
      const data = await res.json();
      log('登录: ' + JSON.stringify(data));
      token = data.data?.token || '';
      driverId = data.data?.driverId || '';
      setStatus(token ? `已登录 driverId=${driverId}` : '登录失败');
    }

    async function apiPost(path) {
      if (!token) { alert('请先登录'); return null; }
      const res = await fetch(`${base()}${path}`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` }
      });
      return res.json();
    }

    async function goOnline() {
      const data = await apiPost('/api/driver/online');
      if (data) {
        log('上线: ' + JSON.stringify(data));
        setStatus(`在线 driverId=${driverId}，可开始上报位置`);
      }
    }

    async function reportLocation() {
      const [lng, lat] = DEMO_ROUTE[routeIndex % DEMO_ROUTE.length];
      routeIndex++;
      const res = await fetch(`${base()}/api/driver/location?location=${lng},${lat}`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      log(`上报位置 #${routeIndex}: ${lng},${lat} → ${data.message || JSON.stringify(data)}`);
      setStatus(`在线 | 最近位置 ${lng}, ${lat} | 下次上报 60s 后`);
    }

    function startLocationLoop() {
      if (!token) { alert('请先登录并上线'); return; }
      if (locationTimer) clearInterval(locationTimer);
      reportLocation();
      locationTimer = setInterval(reportLocation, 60000);
      log('已启动 60 秒位置上报循环');
    }

    async function stopAll() {
      if (locationTimer) {
        clearInterval(locationTimer);
        locationTimer = null;
      }
      const data = await apiPost('/api/driver/offline');
      if (data) log('下线: ' + JSON.stringify(data));
      setStatus('已停止上报并下线');
    }

    function connectWs() {
      const url = document.getElementById('wsUrl').value;
      if (socket) socket.close();
      socket = new WebSocket(url);
      socket.onopen = () => log('WS 已连接: ' + url);
      socket.onmessage = (e) => log('收到新单: ' + e.data);
      socket.onclose = () => log('WS 已断开');
      socket.onerror = () => log('WS 连接失败');
    }

    function disconnectWs() {
      if (socket) socket.close();
    }
  </script>
</body>
</html>
