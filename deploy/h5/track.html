<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>司机位置地图追踪</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    header { padding: 16px; background: #001529; color: #fff; }
    header h1 { margin: 0 0 8px; font-size: 20px; }
    .panel { padding: 16px; display: grid; gap: 8px; max-width: 960px; }
    label { font-weight: 600; font-size: 13px; }
    input, button, select { padding: 8px; box-sizing: border-box; }
    button { background: #1677ff; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button.stop { background: #ff4d4f; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #map { height: calc(100vh - 280px); min-height: 420px; }
    .hint { color: #666; font-size: 13px; margin: 0; }
    #status { font-size: 13px; color: #333; min-height: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>司机位置地图</h1>
    <p class="hint" style="color:#ccc">地图每 60 秒刷新一次，与司机端上报频率一致。使用 OpenStreetMap，无需高德 JS Key。</p>
  </header>

  <div class="panel">
    <label>Gateway 地址</label>
    <input id="baseUrl" value="http://127.0.0.1:30080" />

    <label>模式</label>
    <select id="mode" onchange="switchMode()">
      <option value="all">全量在线司机（公开接口）</option>
      <option value="trip">按行程追踪指定司机（需乘客 Token）</option>
    </select>

    <div id="tripPanel" style="display:none;">
      <div class="row">
        <div>
          <label>乘客用户名</label>
          <input id="username" value="passenger1" />
        </div>
        <div>
          <label>密码</label>
          <input id="password" type="password" value="123456" />
        </div>
      </div>
      <label>行程 ID（发单返回的 data.id）</label>
      <input id="tripId" value="1" />
      <button onclick="loginPassenger()">乘客登录</button>
    </div>

    <div class="row">
      <button onclick="startTracking()">开始追踪 (60s)</button>
      <button class="stop" onclick="stopTracking()">停止</button>
    </div>
    <div id="status">未开始</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([23.04, 113.33], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let token = '';
    let timer = null;
    let markers = [];
    let routeLayer = null;
    let tripMarkers = [];

    const driverIcon = L.divIcon({
      className: '',
      html: '<div style="background:#52c41a;color:#fff;padding:4px 8px;border-radius:12px;font-size:12px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)">司机</div>',
      iconAnchor: [20, 12]
    });

    function base() {
      return document.getElementById('baseUrl').value.replace(/\/$/, '');
    }

    function setStatus(text) {
      document.getElementById('status').textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
    }

    function clearMarkers(list) {
      list.forEach(m => map.removeLayer(m));
      list.length = 0;
    }

    function switchMode() {
      const tripMode = document.getElementById('mode').value === 'trip';
      document.getElementById('tripPanel').style.display = tripMode ? 'block' : 'none';
      stopTracking();
    }

    async function loginPassenger() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch(`${base()}/api/passenger/auth/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
      const data = await res.json();
      token = data.data?.token || '';
      setStatus(token ? '乘客登录成功' : '登录失败: ' + JSON.stringify(data));
    }

    async function refreshAllDrivers() {
      const res = await fetch(`${base()}/api/map/drivers/locations`);
      const locations = await res.json();
      clearMarkers(markers);
      if (!Array.isArray(locations) || locations.length === 0) {
        setStatus('暂无在线司机位置（请先在司机端上线并开始上报）');
        return;
      }
      const bounds = [];
      locations.forEach(loc => {
        const latlng = [loc.latitude, loc.longitude];
        bounds.push(latlng);
        const m = L.marker(latlng, { icon: driverIcon })
          .addTo(map)
          .bindPopup(`司机 #${loc.driverId}<br>更新: ${loc.updatedAt || '-'}`);
        markers.push(m);
      });
      if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
      setStatus(`已刷新 ${locations.length} 位司机位置`);
    }

    function parseLngLat(text) {
      if (!text) return null;
      const [lng, lat] = text.split(',').map(Number);
      return [lat, lng];
    }

    async function loadTripRoute(trip) {
      clearMarkers(tripMarkers);
      if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
      }
      const start = parseLngLat(trip.startLocation);
      const end = parseLngLat(trip.endLocation);
      if (start) {
        const m = L.marker(start).addTo(map).bindPopup('起点: ' + trip.startPoint);
        tripMarkers.push(m);
      }
      if (end) {
        const m = L.marker(end).addTo(map).bindPopup('终点: ' + trip.endPoint);
        tripMarkers.push(m);
      }
      if (start && end) {
        routeLayer = L.polyline([start, end], { color: '#1677ff', dashArray: '8 8' }).addTo(map);
        map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
      }
    }

    async function refreshTripDriver() {
      if (!token) {
        setStatus('请先乘客登录');
        return;
      }
      const tripId = document.getElementById('tripId').value;
      const tripRes = await fetch(`${base()}/api/passenger/trips/${tripId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const tripData = await tripRes.json();
      const trip = tripData.data;
      if (!trip) {
        setStatus('行程查询失败: ' + JSON.stringify(tripData));
        return;
      }
      await loadTripRoute(trip);

      const locRes = await fetch(`${base()}/api/passenger/trips/${tripId}/driver-location`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const locData = await locRes.json();
      const loc = locData.data;
      clearMarkers(markers);
      if (loc && loc.latitude != null) {
        const latlng = [loc.latitude, loc.longitude];
        const m = L.marker(latlng, { icon: driverIcon })
          .addTo(map)
          .bindPopup(`司机 #${loc.driverId}<br>更新: ${loc.updatedAt || '-'}`);
        markers.push(m);
        map.setView(latlng, 14);
        setStatus(`行程 #${tripId} | 司机位置已更新 (${loc.longitude}, ${loc.latitude})`);
      } else {
        setStatus('司机位置暂无: ' + (locData.message || JSON.stringify(locData)));
      }
    }

    async function refresh() {
      const mode = document.getElementById('mode').value;
      if (mode === 'trip') await refreshTripDriver();
      else await refreshAllDrivers();
    }

    function startTracking() {
      stopTracking();
      refresh();
      timer = setInterval(refresh, 60000);
      setStatus('已开始 60 秒自动刷新');
    }

    function stopTracking() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }
  </script>
</body>
</html>
