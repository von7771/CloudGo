spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/carpool_passenger_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:CHANGE_ME_MYSQL_ROOT_PASSWORD}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

minio:
  endpoint: http://127.0.0.1:9000
  access-key: ${MINIO_ACCESS_KEY:CHANGE_ME_MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY:CHANGE_ME_MINIO_SECRET_KEY}
  bucket: carpool

app:
  jwt:
    secret: ${APP_JWT_SECRET:CHANGE_ME_JWT_SECRET}
    expire-ms: 86400000
  minio:
    enabled: true
