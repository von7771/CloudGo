spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: trip-passenger-route
              uri: lb://trip-service
              predicates:
                - Path=/api/passenger/trips,/api/passenger/trips/**
            - id: trip-driver-route
              uri: lb://trip-service
              predicates:
                - Path=/api/driver/trips,/api/driver/trips/**
            - id: map-route
              uri: lb://trip-service
              predicates:
                - Path=/api/map/**
            - id: trip-route
              uri: lb://trip-service
              predicates:
                - Path=/api/trip/**
            - id: passenger-auth-route
              uri: lb://passenger-service
              predicates:
                - Path=/api/passenger/auth/**
            - id: passenger-profile-route
              uri: lb://passenger-service
              predicates:
                - Path=/api/passenger/profile,/api/passenger/profile/**
            - id: driver-auth-route
              uri: lb://driver-service
              predicates:
                - Path=/api/driver/auth/**
            - id: driver-route
              uri: lb://driver-service
              predicates:
                - Path=/api/driver/online,/api/driver/offline,/api/driver/location,/api/driver/documents,/api/driver/documents/**,/api/driver/profile,/api/driver/profile/**
            - id: admin-route
              uri: lb://admin-service
              predicates:
                - Path=/api/admin/**
            - id: ai-assistant-route
              uri: lb://ai-assistant-service
              predicates:
                - Path=/api/assistant,/api/assistant/**
            - id: internal-passenger-route
              uri: lb://passenger-service
              predicates:
                - Path=/api/internal/passenger/**
            - id: internal-driver-route
              uri: lb://driver-service
              predicates:
                - Path=/api/internal/driver/**
            - id: internal-trip-route
              uri: lb://trip-service
              predicates:
                - Path=/api/internal/trip/**

app:
  jwt:
    secret: ${APP_JWT_SECRET:CHANGE_ME_JWT_SECRET}
    public-paths: /api/passenger/auth/login,/api/passenger/auth/register,/api/driver/auth/login,/api/driver/auth/register,/api/admin/auth/login,/api/map/**,/actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
