app:
  jwt:
    secret: ${APP_JWT_SECRET:CHANGE_ME_JWT_SECRET}
    expire-ms: 86400000
  kafka:
    enabled: true
    topic: trip.events
  minio:
    enabled: true

spring:
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: admin-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY:CHANGE_ME_MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY:CHANGE_ME_MINIO_SECRET_KEY}
  bucket: carpool
