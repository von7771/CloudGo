server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        group: DEFAULT_GROUP
        file-extension: yml
        refresh-enabled: false
    sentinel:
      eager: true
      transport:
        dashboard: localhost:8088
        port: 8721
      datasource:
        flow:
          file:
            file: classpath:sentinel/flow-rules.json
            data-type: json
            rule-type: flow
  config:
    import:
      - nacos:gateway.yml

logging:
  level:
    com.alibaba.nacos.client.config.impl.ClientWorker: WARN
