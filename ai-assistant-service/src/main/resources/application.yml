server:
  port: 8085

app:
  llm:
    base-url: https://api.deepseek.com
    model: deepseek-chat
    api-key: ${DEEPSEEK_API_KEY:}
    max-tokens: 512
    temperature: 0.3
    max-tool-rounds: 2

spring:
  application:
    name: ai-assistant-service
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        group: DEFAULT_GROUP
        file-extension: yml
        refresh-enabled: false
  config:
    import:
      - optional:nacos:ai-assistant-service.yml
